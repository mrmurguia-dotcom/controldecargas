<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTROL DE CARGAS - M2</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
.step-hidden { display: none !important; }
#modalResumen { backdrop-filter: blur(4px); }
.mic-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
@keyframes pulse {
0% { opacity: 1; }
50% { opacity: 0.5; }
100% { opacity: 1; }
}
#loader {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.7);
z-index: 200;
align-items: center;
justify-content: center;
color: white;
flex-direction: column;
}
</style>
</head>

<body class="bg-slate-100 min-h-screen pb-24">

<div id="loader">
<div class="animate-spin rounded-full h-16 w-16 border-t-4 border-white mb-4"></div>
<p class="font-bold">Procesando Reporte y Drive...</p>
</div>

<header class="bg-blue-900 text-white p-4 sticky top-0 z-50 shadow-md">
<div class="max-w-md mx-auto flex justify-between items-center">
<div>
<h1 class="font-black text-xl leading-tight">CONTROL DE CARGAS AMBALOG</h1>
<p class="text-[10px] text-blue-300 font-bold uppercase tracking-wider">M2 Consultoría Digital</p>
</div>
<div id="contadores" class="text-[10px] bg-blue-800 px-3 py-1 rounded-lg font-mono text-right">
ESPERANDO...
</div>
</div>
</header>

<main class="max-w-md mx-auto p-4 space-y-4">

<section id="stepCarga" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
<div class="space-y-4">

<div>
<label class="block text-xs font-bold text-slate-400 uppercase mb-1">Verificador</label>
<select id="operadorSelect" onchange="verificarOperador()" class="w-full p-4 bg-slate-50 rounded-2xl font-bold focus:outline-none">
<option value="">Seleccione Verificador...</option>
<option value="Omar Dubi">Omar Dubi</option>
<option value="Jose Servin">Jose Servin</option>
<option value="Maxi Murray">Maxi Murray</option>
<option value="Diego Murcia">Diego Murcia</option>
<option value="Otro">Otro...</option>
</select>

<input type="text" id="operadorOtro" placeholder="Nombre del verificador..."
class="step-hidden w-full mt-2 p-4 bg-slate-50 rounded-2xl font-bold focus:outline-none border border-slate-200">
</div>

<div>
<label class="block text-xs font-bold text-slate-400 uppercase mb-1">Nro Carga</label>
<div class="flex gap-2">
<input type="number" id="nroCarga" placeholder="Ej: 8612"
class="flex-1 p-4 bg-slate-50 rounded-2xl text-xl font-bold focus:outline-none">
<button onclick="iniciar()" id="btnIniciar"
class="bg-blue-600 text-white px-6 rounded-2xl font-bold">OK</button>
</div>
</div>

</div>
</section>

<section id="stepOperacion" class="step-hidden space-y-4">

<div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
<div class="flex justify-between items-center mb-2">
<label class="block text-xs font-bold text-slate-400 uppercase">Identificar Producto</label>
<span id="palletDisplay" class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-black">
PALLET N° 1
</span>
</div>

<div class="flex gap-2">
<input type="text" id="barcode" placeholder="SKU o Etiqueta Pallet"
class="flex-1 p-4 bg-yellow-50 rounded-2xl font-bold focus:outline-none">

<button onclick="buscarArticulo()" class="bg-blue-600 text-white px-4 rounded-2xl font-bold text-sm">OK</button>
<button onclick="toggleCamara()" class="bg-slate-800 text-white px-4 rounded-2xl text-xl">📷</button>
</div>

<div id="reader" class="mt-4 rounded-2xl overflow-hidden hidden"></div>
</div>

<div id="secUM" class="step-hidden bg-blue-50 p-4 rounded-3xl border-2 border-blue-200">
<p class="text-xs font-black text-blue-800 mb-3 uppercase">Seleccione Presentación:</p>
<div id="contenedorUM" class="grid grid-cols-1 gap-2"></div>
</div>

<div id="secCantidad" class="step-hidden bg-white p-6 rounded-3xl shadow-xl border-t-4 border-blue-900">
<div class="flex justify-between items-start mb-2">
<div>
<h2 id="txtArt" class="text-2xl font-black text-slate-900"></h2>
<p id="txtDesc" class="text-sm text-slate-500"></p>
</div>

<button onclick="cerrarPallet()" class="bg-orange-500 text-white px-3 py-2 rounded-xl text-[10px] font-bold">
CAMBIAR PALLET
</button>
</div>

<div class="flex gap-3 mt-4">
<input type="number" id="cantInput" placeholder="Cant"
class="w-1/2 p-4 text-3xl font-black bg-slate-100 rounded-2xl text-center focus:outline-none">

<div class="flex flex-col gap-2 flex-1">
<button onclick="guardar()" class="flex-1 bg-green-600 text-white rounded-2xl font-black text-lg">
REGISTRAR
</button>

<button id="btnVoz" onclick="activarVoz()"
class="bg-slate-200 text-slate-700 py-2 rounded-xl font-bold text-sm">
🎙️ VOZ
</button>
</div>
</div>
</div>

<div id="historial" class="space-y-2 pb-10"></div>

</section>
</main>

<footer id="footerApp"
class="step-hidden fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t flex gap-3 max-w-md mx-auto z-40">
<button onclick="abrirResumen()" class="flex-1 py-4 bg-slate-200 text-slate-700 rounded-2xl font-bold text-xs">
VER RESUMEN
</button>
<button onclick="confirmarFinalizar()" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold text-xs">
FINALIZAR CARGA
</button>
</footer>

<div id="modalResumen"
class="step-hidden fixed inset-0 bg-black/60 z-[100] p-4 flex items-center justify-center">

<div class="bg-white w-full max-w-xs rounded-3xl max-h-[80vh] flex flex-col p-6 shadow-2xl">
<h3 class="font-black text-xl mb-4 text-blue-900">Resumen Carga</h3>

<div id="listaResumen" class="flex-1 overflow-y-auto space-y-3 text-sm border-y py-4"></div>

<button onclick="cerrarResumen()"
class="mt-4 w-full py-3 bg-blue-900 text-white rounded-xl font-bold">
CERRAR
</button>
</div>

</div>

<!-- JS queda igual, no tenía problema de espacios -->
<script>
/* TU JS ORIGINAL SIN CAMBIOS */
</script>

</body>
</html>
