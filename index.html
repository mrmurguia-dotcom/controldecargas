<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL DE CARGAS - M2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .step-hidden { display: none !important; }
        .bg-ok { background-color: #dcfce7 !important; } 
        .bg-diff { background-color: #fee2e2 !important; } 
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-32">

    <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-black text-xl leading-tight">CONTROL DE CARGAS</h1>
                <p class="text-[9px] text-blue-300 font-bold uppercase">M2 Consultoría Digital</p>
            </div>
            <div id="contadores" class="text-[10px] bg-blue-800 px-3 py-1 rounded-lg font-mono text-right">0/0</div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <section id="stepCarga" class="bg-white p-6 rounded-3xl shadow-sm border">
            <div class="space-y-4">
                <select id="operadorSelect" onchange="verificarOperador()" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                    <option value="">Seleccione Verificador...</option>
                    <option value="Omar Dubi">Omar Dubi</option>
                    <option value="Jose Servin">Jose Servin</option>
                    <option value="Maxi Murray">Maxi Murray</option>
                    <option value="Otro">Otro...</option>
                </select>
                <input type="text" id="operadorOtro" placeholder="Nombre..." class="step-hidden w-full p-4 bg-slate-50 rounded-2xl border">
                <input type="number" id="nroCarga" placeholder="Nro Carga" class="w-full p-4 bg-slate-50 rounded-2xl text-xl font-bold">
                <button onclick="iniciar()" id="btnIniciar" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black">INGRESAR</button>
            </div>
        </section>

        <section id="stepOperacion" class="step-hidden space-y-4">
            <div class="flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-orange-200">
                <div class="text-orange-800 font-black text-lg">PALLET N° <span id="palletNum">1</span></div>
                <button onclick="cerrarPallet()" class="bg-orange-500 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-md">CERRAR PALLET</button>
            </div>

            <div class="bg-white p-4 rounded-3xl shadow-sm border">
                <div class="flex gap-2">
                    <input type="text" id="barcode" placeholder="Escanear SKU o Etiqueta Pallet" class="flex-1 p-4 bg-yellow-50 rounded-2xl font-bold text-sm">
                    <button onclick="buscarArticulo()" class="bg-blue-600 text-white px-4 rounded-2xl font-bold">OK</button>
                    <button onclick="toggleCamara()" class="bg-slate-800 text-white px-4 rounded-2xl text-xl">📷</button>
                </div>
                <div id="reader" class="mt-4 rounded-2xl overflow-hidden hidden"></div>
            </div>

            <div id="secUM" class="step-hidden bg-blue-50 p-4 rounded-3xl border-2 border-blue-200">
                <div id="contenedorUM" class="grid grid-cols-1 gap-2"></div>
            </div>

            <div id="secCantidad" class="step-hidden bg-white p-6 rounded-3xl shadow-xl border-t-4 border-blue-900">
                <h2 id="txtArt" class="text-2xl font-black text-slate-900"></h2>
                <p id="txtDesc" class="text-xs text-slate-500 mb-4"></p>
                
                <div class="space-y-4">
                    <div class="flex gap-2 items-center">
                        <input type="number" id="cantInput" placeholder="0" class="flex-1 p-4 text-4xl font-black bg-slate-100 rounded-2xl text-center">
                        <button onclick="activarVoz()" class="bg-red-100 text-red-600 p-4 rounded-2xl text-2xl">🎤</button>
                    </div>
                    <button onclick="guardar()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">REGISTRAR</button>
                </div>
            </div>

            <div id="historial" class="space-y-2 pb-10"></div>
        </section>
    </main>

    <footer id="footerApp" class="step-hidden fixed bottom-0 left-0 right-0 p-4 bg-white/95 border-t flex gap-2 max-w-md mx-auto z-40">
        <button onclick="abrirResumen()" class="flex-1 py-4 bg-slate-200 text-slate-700 rounded-2xl font-bold text-[10px]">VER RESUMEN</button>
        <button onclick="confirmarFinalizar()" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold text-[10px]">FINALIZAR</button>
    </footer>

    <div id="modalResumen" class="step-hidden fixed inset-0 bg-black/60 z-[100] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-xs rounded-3xl max-h-[85vh] flex flex-col p-6 shadow-2xl">
            <h3 class="font-black text-xl mb-4 text-blue-900 border-b pb-2">Resumen de Control</h3>
            <div id="listaResumen" class="flex-1 overflow-y-auto space-y-2 text-sm pr-1"></div>
            <button onclick="cerrarResumen()" class="mt-4 w-full py-3 bg-blue-900 text-white rounded-xl font-bold">VOLVER</button>
        </div>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzKjFlPsGUOP1QgLr2FkFvodke-czEuXRmhoLyYmj7a2bgp4ZGEiHNSek6EUhIteEk/exec"; 
        
        let currentCarga = "", nombreOp = "", selectedItem = null, maleVoice = null, nroPallet = 1;
        let totalCA = 0, scanCA = 0, totalUN = 0, scanUN = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(type) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(type==='ok'?800:150, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + (type==='ok'?0.1:0.5));
        }

        window.speechSynthesis.onvoiceschanged = () => {
            maleVoice = window.speechSynthesis.getVoices().find(v => v.lang.includes('es') && /pablo|diego|jorge|male|hombre/i.test(v.name));
        };
        function decir(t) { 
            const u = new SpeechSynthesisUtterance(t); u.lang='es-AR'; 
            if(maleVoice) u.voice = maleVoice; window.speechSynthesis.speak(u); 
        }

        function activarVoz() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-AR';
            recognition.start();
            decir("Diga la cantidad");
            recognition.onresult = (e) => {
                const vocal = e.results[0][0].transcript.replace(/[^0-9]/g, '');
                if(vocal) {
                    document.getElementById('cantInput').value = vocal;
                    decir(vocal);
                }
            };
        }

        function verificarOperador() {
            const val = document.getElementById('operadorSelect').value;
            document.getElementById('operadorOtro').classList.toggle('step-hidden', val !== "Otro");
        }

        async function iniciar() {
            nombreOp = document.getElementById('operadorSelect').value === "Otro" ? document.getElementById('operadorOtro').value : document.getElementById('operadorSelect').value;
            currentCarga = document.getElementById('nroCarga').value;
            if(!nombreOp || !currentCarga) return alert("Faltan datos");
            const res = await fetch(GOOGLE_URL, {method:'POST', body: JSON.stringify({action:'validarCarga', nroCarga: currentCarga})});
            const data = await res.json();
            if(data.success) {
                document.getElementById('stepCarga').classList.add('step-hidden');
                document.getElementById('stepOperacion').classList.remove('step-hidden');
                document.getElementById('footerApp').classList.remove('step-hidden');
                actualizarContadores();
            } else alert(data.msg);
        }

        function cerrarPallet() {
            if(confirm(`¿Cerrar Pallet N° ${nroPallet} y pasar al siguiente?`)) {
                nroPallet++;
                document.getElementById('palletNum').innerText = nroPallet;
                document.getElementById('historial').innerHTML = ''; 
                decir("Pallet " + nroPallet);
            }
        }

        async function buscarArticulo() {
            const val = document.getElementById('barcode').value.trim();
            if(!val) return;

            if(val.startsWith('H') && val.length >= 30) {
                const itm = val.substring(1, 9);
                const cant = parseInt(val.substring(26, 30));
                
                const res = await fetch(GOOGLE_URL, {method:'POST', body: JSON.stringify({action:'buscarPalletHomogeneo', nroCarga: currentCarga, itm: itm})});
                const data = await res.json();
                
                if(data.success) {
                    decir(`${data.item.sku}. Pallet completo de ${cant} cajas`);
                    prepararRegistro(data.item, cant);
                } else alert(data.msg);
                return;
            }

            decir("SKU " + val);
            const res = await fetch(GOOGLE_URL, {method:'POST', body: JSON.stringify({action:'buscarArticulo', nroCarga: currentCarga, barcode: val})});
            const data = await res.json();
            if(data.success) {
                if(data.opciones.length === 1) { decir(data.opciones[0].um); prepararRegistro(data.opciones[0]); }
                else {
                    const cont = document.getElementById('contenedorUM'); cont.innerHTML = '';
                    data.opciones.forEach(op => {
                        const b = document.createElement('button');
                        b.className = "w-full p-4 bg-white border border-blue-200 rounded-2xl font-black text-xl";
                        b.innerText = op.um;
                        b.onclick = () => { decir(op.um); prepararRegistro(op); };
                        cont.appendChild(b);
                    });
                    document.getElementById('secUM').classList.remove('step-hidden');
                }
            } else alert(data.msg);
        }

        function prepararRegistro(item, cantAuto = null) {
            selectedItem = item;
            document.getElementById('txtArt').innerText = item.sku;
            document.getElementById('txtDesc').innerText = `${item.desc} (${item.um})`;
            document.getElementById('secUM').classList.add('step-hidden');
            document.getElementById('secCantidad').classList.remove('step-hidden');
            if(cantAuto) {
                document.getElementById('cantInput').value = cantAuto;
                guardar(); 
            } else {
                document.getElementById('cantInput').value = '';
                document.getElementById('cantInput').focus();
            }
        }

        async function guardar() {
            const cant = parseInt(document.getElementById('cantInput').value);
            if(!cant) return;

            const finalEscaneado = selectedItem.actual + cant;
            if (finalEscaneado === selectedItem.total) {
                playBeep('ok'); decir("Cantidad OK");
            } else {
                playBeep('err'); decir(`Diferencia. Pide ${selectedItem.total}`);
                if(!confirm(`DIFERENCIA: Pide ${selectedItem.total}, llevas ${finalEscaneado}. ¿Registrar?`)) return;
            }

            await fetch(GOOGLE_URL, {method:'POST', body: JSON.stringify({
                action:'registrarCantidad', nroCarga: currentCarga, 
                indexFila: selectedItem.index, nuevaSuma: finalEscaneado, nroPallet: nroPallet
            })});
            
            decir(`Registrado ${cant} ${selectedItem.um}`);
            addHistorial(selectedItem.sku, cant, selectedItem.um, nroPallet, selectedItem.index);
            document.getElementById('secCantidad').classList.add('step-hidden');
            document.getElementById('barcode').value = '';
            actualizarContadores();
        }

        function addHistorial(sku, c, um, pal, idFila) {
            const divId = "hist-" + Date.now();
            const d = document.createElement('div');
            d.id = divId;
            d.className = "bg-white p-3 rounded-xl border border-slate-200 text-xs flex justify-between items-center shadow-sm mb-1";
            d.innerHTML = `
                <div><b>${sku}</b> (${um}) - P${pal}</div>
                <div class="flex items-center gap-3">
                    <span class="font-black text-green-600">+${c}</span>
                    <button onclick="anularRegistro(${idFila}, ${c}, '${divId}')" class="bg-red-50 text-red-600 p-2 rounded-lg font-bold text-[10px]">❌</button>
                </div>`;
            document.getElementById('historial').prepend(d);
        }

        async function anularRegistro(indexFila, cantidad, htmlId) {
            if(!confirm("¿Anular este registro?")) return;
            await fetch(GOOGLE_URL, {method:'POST', body: JSON.stringify({
                action:'anularRegistro', nroCarga: currentCarga, indexFila: indexFila, cantidad: cantidad
            })});
            document.getElementById(htmlId).remove();
            decir("Registro anulado");
            actualizarContadores();
        }

        async function actualizarContadores() {
            const res = await fetch(GOOGLE_URL, {method:'POST', body: JSON.stringify({action:'obtenerResumen', nroCarga: currentCarga})});
            const data = await res.json();
            if(data.success) {
                totalCA=0; scanCA=0; totalUN=0; scanUN=0;
                data.resumen.forEach(i => {
                    if(i.um.includes("CAJA")) { totalCA += i.total; scanCA += i.scan; }
                    else { totalUN += i.total; scanUN += i.scan; }
                });
                document.getElementById('contadores').innerHTML = `${scanCA}/${totalCA} CA | ${scanUN}/${totalUN} UN`;
                
                if(scanCA >= totalCA && scanUN >= totalUN && totalCA > 0) {
                    alert("¡CARGA COMPLETA!"); decir("Carga completa");
                }
            }
        }

        async function abrirResumen() {
            document.getElementById('modalResumen').classList.remove('step-hidden');
            const res = await fetch(GOOGLE_URL, {method:'POST', body: JSON.stringify({action:'obtenerResumen', nroCarga: currentCarga})});
            const data = await res.json();
            const list = document.getElementById('listaResumen');
            list.innerHTML = '';
            data.resumen.forEach(i => {
                const isOk = i.total === i.scan;
                const d = document.createElement('div');
                d.className = `p-3 rounded-xl border ${isOk ? 'bg-ok border-green-200' : 'bg-diff border-red-200'}`;
                d.innerHTML = `<div class="font-bold text-slate-800">${i.sku}</div>
                               <div class="flex justify-between text-[10px] text-slate-600">
                                 <span>${i.um}</span><span>${i.scan} / ${i.total} ${isOk?'✅':'⚠️'}</span>
                               </div>`;
                list.appendChild(d);
            });
        }

        function cerrarResumen() { document.getElementById('modalResumen').classList.add('step-hidden'); }
        function confirmarFinalizar() { if(confirm("¿Finalizar y generar PDF?")) generarPDF(); }

        async function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const res = await fetch(GOOGLE_URL, {method:'POST', body: JSON.stringify({action:'finalizarCarga', nroCarga: currentCarga})});
            const data = await res.json();
            
            doc.setFont("helvetica", "bold"); doc.setFontSize(18);
            doc.text("REPORTE DE CONTROL DE CARGA", 10, 20);
            
            doc.setFontSize(12);
            doc.text(`Carga Nro: ${currentCarga}`, 10, 30);
            doc.setFontSize(10);
            doc.text(`Verificador: ${nombreOp}`, 10, 36);
            doc.text(`TOTAL CONTROLADO: ${scanCA}/${totalCA} CAJAS  -  ${scanUN}/${totalUN} UNIDADES`, 10, 42);
            
            const ahora = new Date();
            const fH = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');
            doc.setFont("helvetica", "normal"); doc.setFontSize(8);
            doc.text(`Fecha: ${ahora.toLocaleDateString()} ${fH} hs`, 150, 30);

            let y = 52;
            doc.setFont("helvetica", "bold"); doc.setFontSize(8);
            doc.text("SKU", 10, y); doc.text("DESCRIPCION", 35, y); doc.text("UM", 95, y);
            doc.text("TOTAL", 115, y); doc.text("CONT", 130, y); doc.text("PALLET", 145, y); doc.text("CHECK", 185, y);
            doc.line(10, y+2, 200, y+2); y += 8;

            data.reporte.slice(1).forEach((f, idx) => {
                // Índices actualizados para la nueva estructura
                // f[1] = SKU, f[2] = Desc, f[4] = UM, f[5] = Canti (Total), f[6] = Escaneado, f[7] = Pallet
                const total = parseInt(f[5])||0, cont = parseInt(f[6])||0, dif = total !== cont;
                if(dif) doc.setFont("helvetica", "bold"); else doc.setFont("helvetica", "normal");
                
                doc.text(f[1].toString(), 10, y);
                doc.text(f[2].toString().substring(0, 30), 35, y);
                doc.text(f[4].toString(), 95, y);
                doc.text(total.toString(), 115, y);
                doc.text(cont.toString(), 130, y);
                doc.text(f[7] ? f[7].toString().substring(0,20) : "-", 145, y);
                
                doc.text(dif ? "DIF" : "v OK", 185, y);
                
                y += 6;
                if (y > 275) { 
                    doc.text(`Página ${doc.internal.getNumberOfPages()}`, 100, 288);
                    doc.addPage(); y = 20; 
                }
            });
            doc.text(`Página ${doc.internal.getNumberOfPages()}`, 100, 288);

            doc.save(`CONTROL_CARGA_${currentCarga}.pdf`);
            setTimeout(() => location.reload(), 1500);
        }

        let scanner = null;
        function toggleCamara() {
            const r = document.getElementById('reader');
            if(r.classList.contains('hidden')) {
                r.classList.remove('hidden');
                scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
                scanner.render(txt => { document.getElementById('barcode').value = txt; r.classList.add('hidden'); scanner.clear(); buscarArticulo(); });
            } else r.classList.add('hidden');
        }
    </script>
</body>
</html>
