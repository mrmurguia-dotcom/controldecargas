<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL DE CARGAS - M2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .step-hidden { display: none !important; }
        #modalResumen { backdrop-filter: blur(4px); }
        .mic-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-24">

    <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-black text-xl leading-tight">CONTROL DE CARGAS</h1>
                <p class="text-[10px] text-blue-300 font-bold uppercase tracking-wider">M2 Consultoría Digital</p>
            </div>
            <div id="contadores" class="text-[10px] bg-blue-800 px-3 py-1 rounded-lg font-mono text-right">
                ESPERANDO...
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <section id="stepCarga" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Verificador</label>
                    <select id="operadorSelect" onchange="verificarOperador()" class="w-full p-4 bg-slate-50 rounded-2xl font-bold focus:outline-none">
                        <option value="">Seleccione Verificador...</option>
                        <option value="Omar Dubi">Omar Dubi</option>
                        <option value="Jose Servin">Jose Servin</option>
                        <option value="Maxi Murray">Maxi Murray</option>
                        <option value="Otro">Otro...</option>
                    </select>
                    <input type="text" id="operadorOtro" placeholder="Nombre del verificador..." class="step-hidden w-full mt-2 p-4 bg-slate-50 rounded-2xl font-bold focus:outline-none border border-slate-200">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Nro Carga</label>
                    <div class="flex gap-2">
                        <input type="number" id="nroCarga" placeholder="Ej: 8612" class="flex-1 p-4 bg-slate-50 rounded-2xl text-xl font-bold focus:outline-none">
                        <button onclick="iniciar()" id="btnIniciar" class="bg-blue-600 text-white px-6 rounded-2xl font-bold">OK</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="stepOperacion" class="step-hidden space-y-4">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase">Identificar Producto</label>
                    <span id="palletDisplay" class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-black">PALLET N° 1</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="barcode" placeholder="SKU" class="flex-1 p-4 bg-yellow-50 rounded-2xl font-bold focus:outline-none">
                    <button onclick="buscarArticulo()" class="bg-blue-600 text-white px-4 rounded-2xl font-bold text-sm">OK</button>
                    <button onclick="toggleCamara()" class="bg-slate-800 text-white px-4 rounded-2xl text-xl">📷</button>
                </div>
                <div id="reader" class="mt-4 rounded-2xl overflow-hidden hidden"></div>
            </div>

            <div id="secUM" class="step-hidden bg-blue-50 p-4 rounded-3xl border-2 border-blue-200">
                <p class="text-xs font-black text-blue-800 mb-3 uppercase">Seleccione Presentación:</p>
                <div id="contenedorUM" class="grid grid-cols-1 gap-2"></div>
            </div>

            <div id="secCantidad" class="step-hidden bg-white p-6 rounded-3xl shadow-xl border-t-4 border-blue-900">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <h2 id="txtArt" class="text-2xl font-black text-slate-900"></h2>
                        <p id="txtDesc" class="text-sm text-slate-500"></p>
                    </div>
                    <button onclick="cerrarPallet()" class="bg-orange-500 text-white px-3 py-2 rounded-xl text-[10px] font-bold">CERRAR PALLET</button>
                </div>
                
                <div class="flex gap-3 mt-4">
                    <input type="number" id="cantInput" placeholder="Cant" class="w-1/2 p-4 text-3xl font-black bg-slate-100 rounded-2xl text-center focus:outline-none">
                    <div class="flex flex-col gap-2 flex-1">
                        <button onclick="guardar()" class="flex-1 bg-green-600 text-white rounded-2xl font-black text-lg">REGISTRAR</button>
                        <button id="btnVoz" onclick="activarVoz()" class="bg-slate-200 text-slate-700 py-2 rounded-xl font-bold text-sm">🎙️ VOZ</button>
                    </div>
                </div>
            </div>

            <div id="historial" class="space-y-2 pb-10"></div>
        </section>
    </main>

    <footer id="footerApp" class="step-hidden fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t flex gap-3 max-w-md mx-auto z-40">
        <button onclick="abrirResumen()" class="flex-1 py-4 bg-slate-200 text-slate-700 rounded-2xl font-bold text-xs">VER RESUMEN</button>
        <button onclick="confirmarFinalizar()" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold text-xs">FINALIZAR CARGA</button>
    </footer>

    <div id="modalResumen" class="step-hidden fixed inset-0 bg-black/60 z-[100] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-xs rounded-3xl max-h-[80vh] flex flex-col p-6 shadow-2xl">
            <h3 class="font-black text-xl mb-4 text-blue-900">Resumen Carga</h3>
            <div id="listaResumen" class="flex-1 overflow-y-auto space-y-3 text-sm border-y py-4"></div>
            <button onclick="cerrarResumen()" class="mt-4 w-full py-3 bg-blue-900 text-white rounded-xl font-bold">CERRAR</button>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzKjFlPsGUOP1QgLr2FkFvodke-czEuXRmhoLyYmj7a2bgp4ZGEiHNSek6EUhIteEk/exec"; 
        
        let currentCarga = "";
        let nombreOp = "";
        let selectedItem = null;
        let maleVoice = null;
        let nroPalletActual = 1;
        let html5QrCode = null;

        // --- LÓGICA DE VOZ ---
        const recognition = (window.SpeechRecognition || window.webkitSpeechRecognition) ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
        if(recognition) {
            recognition.lang = 'es-AR';
            recognition.onresult = (event) => {
                const texto = event.results[0][0].transcript;
                const numero = texto.match(/\d+/);
                if(numero) {
                    document.getElementById('cantInput').value = numero[0];
                    decir("Registrando " + numero[0]);
                    guardar();
                }
                document.getElementById('btnVoz').classList.remove('mic-active');
            };
            recognition.onerror = () => document.getElementById('btnVoz').classList.remove('mic-active');
        }

        function activarVoz() {
            if(!recognition) return alert("Voz no soportada");
            document.getElementById('btnVoz').classList.add('mic-active');
            recognition.start();
        }

        // --- SONIDOS ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'ok') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        function decir(t) { 
            const u = new SpeechSynthesisUtterance(t); 
            u.lang = 'es-AR'; 
            window.speechSynthesis.speak(u); 
        }

        // --- CÁMARA ---
        function toggleCamara() {
            const readerDiv = document.getElementById('reader');
            if (readerDiv.classList.contains('hidden')) {
                readerDiv.classList.remove('hidden');
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                    (decodedText) => {
                        document.getElementById('barcode').value = decodedText;
                        buscarArticulo();
                        pararCamara();
                    }
                );
            } else {
                pararCamara();
            }
        }

        function pararCamara() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').classList.add('hidden');
                });
            }
        }

        // --- ACCIONES PRINCIPALES ---
        function verificarOperador() {
            const val = document.getElementById('operadorSelect').value;
            if(val === "Otro") document.getElementById('operadorOtro').classList.remove('step-hidden');
            else document.getElementById('operadorOtro').classList.add('step-hidden');
        }

        async function iniciar() {
            const sel = document.getElementById('operadorSelect').value;
            nombreOp = sel === "Otro" ? document.getElementById('operadorOtro').value : sel;
            currentCarga = document.getElementById('nroCarga').value;
            
            if(!nombreOp || !currentCarga) return alert("Complete Verificador y Nro Carga.");
            
            const btn = document.getElementById('btnIniciar');
            btn.innerText = "⏳";
            btn.disabled = true;

            try {
                const res = await fetch(GOOGLE_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'validarCarga', nroCarga: currentCarga })
                });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('stepCarga').classList.add('step-hidden');
                    document.getElementById('stepOperacion').classList.remove('step-hidden');
                    document.getElementById('footerApp').classList.remove('step-hidden');
                    actualizarContadores();
                } else {
                    alert(data.msg || "Carga no encontrada");
                }
            } catch(e) {
                alert("Error de conexión. Verifica la URL del script.");
            } finally {
                btn.innerText = "OK";
                btn.disabled = false;
            }
        }

        async function buscarArticulo() {
            const sku = document.getElementById('barcode').value;
            if(!sku) return;
            
            const res = await fetch(GOOGLE_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'buscarArticulo', nroCarga: currentCarga, barcode: sku })
            });
            const data = await res.json();
            
            if(data.success) {
                if(data.opciones.length === 1) {
                    prepararRegistro(data.opciones[0]);
                } else {
                    const cont = document.getElementById('contenedorUM');
                    cont.innerHTML = '';
                    data.opciones.forEach(op => {
                        const b = document.createElement('button');
                        b.className = "w-full p-4 bg-white border border-blue-200 rounded-2xl font-black text-xl text-center";
                        b.innerText = op.um;
                        b.onclick = () => prepararRegistro(op);
                        cont.appendChild(b);
                    });
                    document.getElementById('secUM').classList.remove('step-hidden');
                }
            } else { 
                playBeep('err');
                alert(data.msg); 
            }
        }

        function prepararRegistro(item) {
            selectedItem = item;
            document.getElementById('txtArt').innerText = item.sku;
            document.getElementById('txtDesc').innerText = `${item.desc} (${item.um})`;
            document.getElementById('secUM').classList.add('step-hidden');
            document.getElementById('secCantidad').classList.remove('step-hidden');
            document.getElementById('cantInput').focus();
            decir(item.um);
        }

        async function guardar() {
            const cant = parseInt(document.getElementById('cantInput').value);
            if(!cant) return;

            const finalEscaneado = (selectedItem.actual || 0) + cant;

            if (finalEscaneado > selectedItem.total) {
                playBeep('err');
                decir("Supera la cantidad");
                return alert("Error: La cantidad supera lo solicitado.");
            }

            const res = await fetch(GOOGLE_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'registrarCantidad', 
                    nroCarga: currentCarga, 
                    indexFila: selectedItem.index, 
                    nuevaSuma: finalEscaneado,
                    nroPallet: nroPalletActual
                })
            });
            
            const data = await res.json();
            if(data.success) {
                playBeep('ok');
                addHistorial(selectedItem.sku, cant, selectedItem.um);
                document.getElementById('secCantidad').classList.add('step-hidden');
                document.getElementById('barcode').value = '';
                document.getElementById('barcode').focus();
                actualizarContadores();
            }
        }

        function addHistorial(sku, c, um) {
            const list = document.getElementById('historial');
            const d = document.createElement('div');
            d.className = "bg-white p-3 rounded-xl border border-slate-200 text-sm flex justify-between items-center shadow-sm mb-2";
            d.innerHTML = `<div><b>${sku}</b> (${um})</div><div class="font-black text-green-600">+${c}</div>`;
            list.prepend(d);
        }

        async function actualizarContadores() {
            const res = await fetch(GOOGLE_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'obtenerResumen', nroCarga: currentCarga })
            });
            const data = await res.json();
            if(data.success) {
                let cT=0, cS=0, uT=0, uS=0;
                data.resumen.forEach(i => {
                    if(i.um.includes("CAJA")) { cT += i.total; cS += i.scan; }
                    else { uT += i.total; uS += i.scan; }
                });
                document.getElementById('contadores').innerHTML = `${cS}/${cT} CA<br>${uS}/${uT} UN`;
            }
        }

        function cerrarPallet() {
            nroPalletActual++;
            document.getElementById('palletDisplay').innerText = `PALLET N° ${nroPalletActual}`;
            decir("Pallet cerrado");
            playBeep('ok');
        }

        async function abrirResumen() {
            document.getElementById('modalResumen').classList.remove('step-hidden');
            const res = await fetch(GOOGLE_URL, {
                method: 'POST', 
                body: JSON.stringify({action:'obtenerResumen', nroCarga: currentCarga})
            });
            const data = await res.json();
            const list = document.getElementById('listaResumen');
            list.innerHTML = '';
            data.resumen.forEach(i => {
                const d = document.createElement('div');
                d.className = "p-2 bg-slate-50 rounded-lg border mb-2 text-xs";
                d.innerHTML = `<b>${i.sku}</b><br>${i.um}: ${i.scan}/${i.total}`;
                list.appendChild(d);
            });
        }

        function cerrarResumen() { document.getElementById('modalResumen').classList.add('step-hidden'); }

        async function confirmarFinalizar() {
            if(confirm("¿Finalizar carga y generar PDF?")) {
                const res = await fetch(GOOGLE_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'obtenerResumen', nroCarga: currentCarga })
                });
                const data = await res.json();
                generarPDF(data.resumen);
                await fetch(GOOGLE_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'finalizarCarga', nroCarga: currentCarga })
                });
                alert("Carga Finalizada");
                location.reload();
            }
        }

        function generarPDF(datos) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text("REPORTE DE CARGA: " + currentCarga, 10, 20);
            doc.setFontSize(12);
            doc.text("Verificador: " + nombreOp, 10, 30);
            doc.text("Fecha: " + new Date().toLocaleString(), 10, 40);
            
            let y = 60;
            doc.text("SKU", 10, y);
            doc.text("UM", 80, y);
            doc.text("CONTADO", 150, y);
            doc.line(10, y+2, 200, y+2);
            
            y += 10;
            datos.forEach(item => {
                if(y > 280) { doc.addPage(); y = 20; }
                doc.text(item.sku.toString(), 10, y);
                doc.text(item.um.toString(), 80, y);
                doc.text(item.scan.toString() + " / " + item.total.toString(), 150, y);
                y += 8;
            });
            doc.save(`Carga_${currentCarga}.pdf`);
        }
    </script>
</body>
</html>
