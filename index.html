<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operario - Control de Carga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .status-card { transition: all 0.3s ease; }
        .btn-scan { background-color: #1e3a8a; color: white; }
        .btn-scan:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-blue-900 p-6 text-white text-center">
            <h1 class="text-xl font-bold uppercase tracking-widest">Control de Carga M2</h1>
            <p class="text-blue-200 text-sm italic">Operaciones de Depósito</p>
        </div>

        <div class="p-6 space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 uppercase">Número de Carga (Pestaña)</label>
                <input type="number" id="nroCarga" placeholder="Ej: 8612" 
                    class="w-full p-4 bg-gray-100 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:outline-none text-lg font-bold">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 uppercase">Código de Artículo (ART)</label>
                <div class="flex gap-2">
                    <input type="text" id="barcode" placeholder="Escanee o tipee ART" 
                        class="flex-1 p-4 bg-gray-100 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:outline-none text-lg font-semibold">
                    <button onclick="validarProducto()" class="btn-scan px-6 rounded-2xl font-bold">OK</button>
                </div>
            </div>

            <hr class="border-gray-100">

            <div id="resultado" class="status-card hidden p-6 rounded-2xl text-center">
                <h2 id="resArt" class="text-2xl font-black mb-1"></h2>
                <p id="resDesc" class="text-gray-600 text-sm mb-4 leading-tight"></p>
                
                <div class="flex justify-center items-baseline gap-2">
                    <span id="resCant" class="text-5xl font-black text-blue-900">0</span>
                    <span class="text-gray-400 text-xl">/</span>
                    <span id="resTotal" class="text-gray-400 text-xl font-bold">0</span>
                </div>
                <p class="text-xs uppercase font-bold text-gray-400 mt-2">Cantidad Confirmada</p>
            </div>

            <div id="errorMsg" class="hidden p-4 bg-red-100 text-red-700 rounded-2xl text-center font-bold text-sm">
            </div>
        </div>
        
        <div class="p-4 bg-gray-50 text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Sistema de Gestión M2 - 2026</p>
        </div>
    </div>

    <script>
        // URL DE TU IMPLEMENTACIÓN ACTUALIZADA
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwqMe_5CSD0HJLu1IZriZ-sJwzBkZ1vU6sPhq1wsJ6ko8cnSix0uHKEXss33Ea7FbQ5/exec";

        async function validarProducto() {
            const nroCarga = document.getElementById('nroCarga').value;
            const barcode = document.getElementById('barcode').value;
            const resDiv = document.getElementById('resultado');
            const errorDiv = document.getElementById('errorMsg');

            if (!nroCarga || !barcode) {
                mostrarError("Complete carga y código");
                return;
            }

            // Limpiar estados
            resDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');

            try {
                const response = await fetch(GOOGLE_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'validarEscaneo',
                        nroCarga: nroCarga,
                        barcode: barcode
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('resArt').innerText = data.art;
                    document.getElementById('resDesc').innerText = data.desc;
                    document.getElementById('resCant').innerText = data.actual;
                    document.getElementById('resTotal').innerText = data.total;
                    
                    resDiv.classList.remove('hidden');
                    resDiv.classList.add('bg-green-50');
                    document.getElementById('barcode').value = ''; // Limpiar para el próximo
                    document.getElementById('barcode').focus();
                } else {
                    mostrarError(data.msg);
                }
            } catch (e) {
                mostrarError("Error de conexión con el servidor");
            }
        }

        function mostrarError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg;
            errorDiv.classList.remove('hidden');
            // Vibración simple si el dispositivo lo permite
            if (window.navigator.vibrate) window.navigator.vibrate(200);
        }

        // Permitir dar "Enter" en el input del código
        document.getElementById('barcode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') validarProducto();
        });
    </script>
</body>
</html>
