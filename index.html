<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M2 Picking - Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-md mx-auto p-4">
    <header class="bg-[#1e3a5f] text-white p-6 rounded-2xl shadow-xl mb-6">
      <h1 class="text-2xl font-black italic">M2 LOGÍSTICA</h1>
      <p class="text-xs opacity-80 uppercase tracking-widest">Sistema de Control de Picking</p>
    </header>

    <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 border border-gray-100">
      <label class="block text-[10px] font-bold text-gray-400 mb-1 tracking-tighter">NÚMERO DE CARGA (XLS)</label>
      <div class="flex gap-2">
        <input type="number" id="nroCarga" placeholder="Ej: 8612" class="flex-1 bg-gray-50 border-none p-3 rounded-xl outline-none focus:ring-2 ring-blue-500 font-bold">
        <button onclick="importar()" id="btnImport" class="bg-orange-500 text-white px-4 py-3 rounded-xl font-bold text-sm shadow-lg shadow-orange-200 active:scale-95 transition-all">IMPORTAR</button>
      </div>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 border border-gray-100">
      <div id="reader" class="rounded-xl overflow-hidden shadow-inner"></div>
      <div id="statusControl" class="mt-4 p-4 rounded-xl text-center font-bold bg-gray-50 text-gray-400 border-2 border-dashed border-gray-200">
        Esperando escaneo...
      </div>
    </div>

    <div id="feedbackBox" class="hidden transform transition-all duration-500 scale-95 opacity-0">
      <div class="bg-blue-600 text-white p-5 rounded-2xl shadow-xl">
        <div class="flex justify-between items-start mb-2">
          <span id="fArt" class="text-2xl font-black"></span>
          <span class="bg-blue-400/30 px-2 py-1 rounded text-[10px] font-bold uppercase">Detectado</span>
        </div>
        <p id="fDesc" class="text-sm opacity-90 mb-4 font-medium leading-tight"></p>
        
        <div class="bg-blue-800/40 p-3 rounded-xl">
          <div class="flex justify-between text-xs font-bold mb-2">
            <span>PROGRESO DE CARGA</span>
            <span id="fCant"></span>
          </div>
          <div class="h-3 w-full bg-blue-900/50 rounded-full overflow-hidden">
            <div id="fBar" class="h-full bg-green-400 shadow-[0_0_10px_rgba(74,222,128,0.5)] transition-all duration-500" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxEvbiImOLlbDGkLyIQOjJOq641_3qVZssw1uTSM24C5Hw1NjpiDo48Bjd_0b1IWro/exec";
    
    // Función para hablar con Google Apps Script
    async function callGoogle(payload) {
      const response = await fetch(GOOGLE_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      return await response.json();
    }

    async function importar() {
      const nro = document.getElementById('nroCarga').value;
      if(!nro) return alert("Ingresa el número de carga");
      
      const btn = document.getElementById('btnImport');
      btn.disabled = true;
      btn.innerText = "...";

      try {
        const res = await callGoogle({ action: "importarCarga", nroCarga: nro });
        alert(res.msg);
      } catch (e) {
        alert("Error de conexión. Verifica que la App Web de Google esté publicada.");
      } finally {
        btn.disabled = false;
        btn.innerText = "IMPORTAR";
      }
    }

    async function onScanSuccess(decodedText) {
      const nro = document.getElementById('nroCarga').value;
      if(!nro) return alert("Indica la carga primero.");

      document.getElementById('statusControl').innerText = "Verificando " + decodedText + "...";
      
      try {
        const res = await callGoogle({ action: "validarEscaneo", barcode: decodedText, nroCarga: nro });
        
        const status = document.getElementById('statusControl');
        const fb = document.getElementById('feedbackBox');

        if(res.success) {
          status.innerText = "✓ ITEM CORRECTO";
          status.className = "mt-4 p-4 rounded-xl text-center font-bold bg-green-50 text-green-600 border-2 border-green-200";
          
          fb.classList.remove('hidden');
          setTimeout(() => { fb.classList.add('scale-100', 'opacity-100'); }, 10);
          
          document.getElementById('fArt').innerText = res.art;
          document.getElementById('fDesc').innerText = res.desc;
          document.getElementById('fCant').innerText = res.actual + " / " + res.total;
          document.getElementById('fBar').style.width = (res.actual / res.total * 100) + "%";
        } else {
          status.innerText = "⚠️ " + res.msg;
          status.className = "mt-4 p-4 rounded-xl text-center font-bold bg-red-50 text-red-600 border-2 border-red-200";
        }
      } catch (e) {
        console.error(e);
      }
    }

    let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    scanner.render(onScanSuccess);
  </script>
</body>
</html>
