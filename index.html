<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operario M2 - Control por Pasos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .btn-primary { background-color: #1e3a8a; color: white; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .hidden-section { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-blue-900 p-4 text-white text-center">
            <h1 class="text-xl font-bold tracking-widest">CONTROL M2</h1>
        </div>

        <div class="p-6 space-y-6">
            
            <div id="step1">
                <label class="text-xs font-bold text-gray-500 uppercase">1. Número de Carga</label>
                <div class="flex gap-2 mt-1">
                    <input type="number" id="nroCarga" placeholder="Ej: 8612" class="flex-1 p-3 bg-gray-100 rounded-xl font-bold text-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="validarCarga()" class="btn-primary px-6 rounded-xl font-bold" id="btnCarga">OK</button>
                </div>
            </div>

            <div id="step2" class="hidden-section pt-4 border-t border-gray-200">
                <label class="text-xs font-bold text-gray-500 uppercase">2. Buscar Artículo</label>
                <div class="flex gap-2 mt-1">
                    <input type="text" id="barcode" placeholder="Tipear SKU..." class="flex-1 p-3 bg-gray-100 rounded-xl font-bold text-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="buscarArticulo()" class="btn-primary px-4 rounded-xl font-bold">OK</button>
                    <button onclick="abrirCamara()" class="bg-gray-800 text-white px-4 rounded-xl">📷</button>
                </div>
                <div id="reader" class="w-full mt-4 rounded-xl overflow-hidden hidden-section"></div>
            </div>

            <div id="step3" class="hidden-section p-4 bg-blue-50 border border-blue-100 rounded-2xl">
                <p class="text-xs font-bold text-green-600 uppercase mb-2">✓ SKU ENCONTRADO EN LA CARGA</p>
                <h2 id="resArt" class="text-2xl font-black text-blue-900 leading-none"></h2>
                <p id="resDesc" class="text-gray-600 text-sm mb-4"></p>
                
                <label class="text-xs font-bold text-gray-500 uppercase">3. Cantidad a cargar (Faltan: <span id="resFalta"></span>)</label>
                <div class="flex gap-2 mt-1">
                    <input type="number" id="cantidad" placeholder="Cant" class="w-24 p-3 bg-white border border-gray-300 rounded-xl font-bold text-xl text-center focus:outline-none">
                    <button onclick="dictarCantidad()" class="bg-red-500 text-white px-4 rounded-xl font-bold active:scale-95">🎤 Hablar</button>
                    <button onclick="guardarCantidad()" class="btn-primary flex-1 rounded-xl font-bold">GUARDAR</button>
                </div>
            </div>

            <div id="msgBox" class="hidden-section p-3 rounded-xl text-center font-bold text-sm"></div>

        </div>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwqMe_5CSD0HJLu1IZriZ-sJwzBkZ1vU6sPhq1wsJ6ko8cnSix0uHKEXss33Ea7FbQ5/exec";
        let html5QrcodeScanner;

        function showMsg(text, type = 'error') {
            const box = document.getElementById('msgBox');
            box.innerText = text;
            box.className = `p-3 rounded-xl text-center font-bold text-sm mt-4 ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 4000);
        }

        async function validarCarga() {
            const btn = document.getElementById('btnCarga');
            const nroCarga = document.getElementById('nroCarga').value;
            if(!nroCarga) return showMsg("Ingrese un número de carga");

            btn.innerText = "...";
            try {
                const res = await fetch(GOOGLE_URL, { method: 'POST', body: JSON.stringify({ action: 'validarCarga', nroCarga }) });
                const data = await res.json();
                if(data.success) {
                    document.getElementById('nroCarga').disabled = true;
                    document.getElementById('step2').style.display = 'block';
                    showMsg("Carga Validada", "success");
                } else {
                    showMsg(data.msg);
                }
            } catch(e) { showMsg("Error de conexión"); }
            btn.innerText = "OK";
        }

        async function buscarArticulo() {
            const nroCarga = document.getElementById('nroCarga').value;
            const barcode = document.getElementById('barcode').value;
            if(!barcode) return showMsg("Ingrese o escanee SKU");

            try {
                const res = await fetch(GOOGLE_URL, { method: 'POST', body: JSON.stringify({ action: 'buscarArticulo', nroCarga, barcode }) });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('resArt').innerText = data.art;
                    document.getElementById('resDesc').innerText = data.desc;
                    document.getElementById('resFalta').innerText = data.faltante;
                    document.getElementById('step3').style.display = 'block';
                    document.getElementById('cantidad').value = '';
                    if(html5QrcodeScanner) html5QrcodeScanner.clear(); // Apaga cámara si estaba prendida
                } else {
                    showMsg(data.msg);
                    document.getElementById('step3').style.display = 'none';
                }
            } catch(e) { showMsg("Error de conexión"); }
        }

        async function guardarCantidad() {
            const nroCarga = document.getElementById('nroCarga').value;
            const barcode = document.getElementById('barcode').value;
            const cantidad = document.getElementById('cantidad').value;

            if(!cantidad || cantidad <= 0) return showMsg("Ingrese una cantidad válida");

            try {
                const res = await fetch(GOOGLE_URL, { method: 'POST', body: JSON.stringify({ action: 'registrarCantidad', nroCarga, barcode, cantidad }) });
                const data = await res.json();
                
                if(data.success) {
                    showMsg(data.msg, "success");
                    // Resetear para el siguiente artículo
                    document.getElementById('step3').style.display = 'none';
                    document.getElementById('barcode').value = '';
                    document.getElementById('barcode').focus();
                } else {
                    showMsg(data.msg);
                }
            } catch(e) { showMsg("Error de conexión"); }
        }

        function abrirCamara() {
            document.getElementById('reader').style.display = 'block';
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            html5QrcodeScanner.render((decodedText) => {
                document.getElementById('barcode').value = decodedText;
                html5QrcodeScanner.clear();
                document.getElementById('reader').style.display = 'none';
                buscarArticulo(); // Autoejecuta la búsqueda al escanear
            });
        }

        function dictarCantidad() {
            if ('webkitSpeechRecognition' in window) {
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'es-AR';
                recognition.start();
                recognition.onresult = function(event) {
                    const numero = parseInt(event.results[0][0].transcript.replace(/\D/g,''));
                    if(!isNaN(numero)) document.getElementById('cantidad').value = numero;
                    else showMsg("No se entendió el número");
                };
            } else {
                showMsg("Tu navegador no soporta dictado por voz");
            }
        }
    </script>
</body>
</html>
